---
- name: "Set DNS Record on CloudFlare"
  include_role:
    name: cloudflare-dns
  vars:
    subdomain: influxdb

#- name: Slurp hashed htpasswd
#  slurp:
#    src: "/opt/traefik/.htpasswd"
#  register: hashed
#
#- name: Set hashed password
#  set_fact:
#    htpasswd: "{{ hashed['content'] | b64decode }}"

- name: Stop and remove any existing container
  docker_container:
    name: influxdb
    state: absent

- name: Create influxdb directories
  file: "path={{ item }} state=directory mode=0775 owner={{ user.name }} group={{ user.name }}"
  with_items:
    - /opt/influxdb
    - /opt/scripts/influxdb

- name: Create and start container
  docker_container:
    name: influxdb
    image: "influxdb:latest"
    pull: yes
    published_ports:
      - "8086:8086"
    env:
      USER_ID: "{{ uid }}"
      GROUP_ID: "{{ gid }}"
    labels:
      traefik.enable: "{{ traefik.enable }}"
      traefik.backend: "influxdb"
      traefik.frontend.redirect.entryPoint: "https"
      traefik.frontend.rule: "Host:influxdb.{{ user.domain }}"
      traefik.port: "8086"
      traefik.frontend.auth.basic: "{{ htpasswd }}"
      traefik.docker.network: "redbeard"
      "com.github.homebox.homebox_managed": "true"
    volumes:
      - "/opt/influxdb:/var/lib/influxdb:rw"
    networks:
      - name: redbeard
        aliases:
          - influxdb
    purge_networks: yes
    restart_policy: always
    state: started
