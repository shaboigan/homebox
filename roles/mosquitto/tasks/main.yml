---
- name: Stop and remove any existing container
  docker_container:
    name: mosquitto
    state: absent

- name: Create mosquitto directories
  file: "path={{ item }} state=directory mode=0775 owner={{ user.name }} group={{ user.name }}"
  with_items:
    - /opt/mosquitto
    - /opt/scripts/mosquitto

- name: Create and start container
  docker_container:
    name: mosquitto
    hostname: mosquitto
    image: "eclipse-mosquitto"
    pull: yes
    published_ports:
      - 1883:1883
      - 8883:8883
      - 9001:9001
    env:
      USER_ID: "{{ uid }}"
      GROUP_ID: "{{ gid }}"
      TZ: "{{ tz }}"
    labels:
      "com.github.homebox.homebox_managed": "true"
    volumes:
      - "/opt/mosquitto/config:/mosquitto/config:rw"
      - "/opt/mosquitto/data:/mosquitto/data:rw"
      - "/opt/mosquitto/logs:/mosquitto/logs:rw"
    networks:
      - name: IoT
        aliases:
          - mosquitto
    purge_networks: yes
    restart_policy: always
    state: started

- name: Stop container to customize network
  docker_container:
    name: mosquitto
    state: stopped

- name: "Remote from IoT network to set static ip"
  shell: "docker network disconnect IoT mosquitto"

- name: "Connect to IoT network on static ip"
  shell: "docker network connect IoT mosquitto --ip 10.10.10.2"

- name: "Connect to redbeard network on static ip"
  shell: "docker network connect redbeard mosquitto --ip 172.18.0.10"

- name: Start container to apply network changes
  docker_container:
    name: mosquitto
    state: started